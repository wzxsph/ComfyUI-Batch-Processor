name: Python Application

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"

    - name: Install dependencies
      run: |
        uv sync

    - name: Lint with ruff
      run: |
        # 运行 ruff 语法检查以及格式检查
        # 使用 uvx (uv tool run) 可以直接运行 ruff 而无需在项目依赖中显式安装
        uvx ruff check --output-format=github .
        
    - name: Check code formatting
      # 如果格式不对允许继续（避免初次引入因为格式问题阻塞）
      continue-on-error: true
      run: |
        uvx ruff format --check .

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          uv sync

      - name: Build Executable with PyInstaller
        run: |
          uv run pip install pyinstaller
          uv run pyinstaller --noconfirm --onefile --windowed --icon=icon.png --collect-all customtkinter --name "ComfyUI-Batch-Pro" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyUI-Batch-Pro-Windows.exe
          path: dist/ComfyUI-Batch-Pro.exe

  release:
    name: Create GitHub Release
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Windows Executable
        uses: actions/download-artifact@v4
        with:
          name: ComfyUI-Batch-Pro-Windows.exe
          path: build_artifacts
        
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          artifacts: "build_artifacts/ComfyUI-Batch-Pro.exe"
