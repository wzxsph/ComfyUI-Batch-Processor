name: Python Application

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.1.5)"
        required: false
        default: "v0.1.5"

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || startsWith(github.event.inputs.tag, 'v')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"

    - name: Install dependencies
      run: |
        uv sync

    - name: Lint with ruff
      run: |
        # 运行 ruff 语法检查以及格式检查
        # 使用 uvx (uv tool run) 可以直接运行 ruff 而无需在项目依赖中显式安装
        uvx ruff check --output-format=github .
        
    - name: Check code formatting
      # 如果格式不对允许继续（避免初次引入因为格式问题阻塞）
      continue-on-error: true
      run: |
        uvx ruff format --check .

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Build Executable with PyInstaller
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --collect-all customtkinter --name "ComfyUI-Batch-Pro-Windows" main.py
          uv run pyinstaller --noconfirm --onefile --icon=icon.ico --collect-all customtkinter --name "ComfyUI-Batch-Pro-Debug" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyUI-Batch-Pro-Executables
          path: |
            dist/ComfyUI-Batch-Pro-Windows.exe
            dist/ComfyUI-Batch-Pro-Debug.exe

  release:
    name: Create GitHub Release
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
        
      - name: Download Windows Executable
        uses: actions/download-artifact@v4
        with:
          name: ComfyUI-Batch-Pro-Executables
          path: build_artifacts
        
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          artifacts: "build_artifacts/ComfyUI-Batch-Pro-Windows.exe,build_artifacts/ComfyUI-Batch-Pro-Debug.exe"
